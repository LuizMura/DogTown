  <body>
    <header>
      <div class="navbar">
        <div class="logo">
          <a href="index.html"><img src="img/logo2.png" alt="DogTownBrew" /></a>
          <a href="index.html"><p class="brand-title">DOGTOWN BREW ®</p></a>
        </div>

        <div class="mobile-menu">
          <i class="fas fa-bars"></i>
          <!-- Ícone do menu -->
        </div>

        <ul class="nav-list" id="nav-list">
          <li><a href="index.html">INÍCIO</a></li>
          <li><a href="loja.html">LOJA</a></li>
          <li><a href="chope.html">BARRIL</a></li>
          <li><a href="sobre.html">SOBRE</a></li>
          <li><a href="contato.html">CONTATO</a></li>
        </ul>

        <div id="icone-carrinho">
          <a href="loja.html">
            <img
              src="https://cdn-icons-png.flaticon.com/512/107/107831.png"
              alt="Carrinho"
              width="24"
            />
            <span id="contador-itens">0</span>
          </a>
        </div>
      </div>
    </header>

    <main>
      <div class="header-loja">
        <h1 class="titulo">NOSSAS CERVEJAS</h1>
        <div class="subtitulo">
          Ao "Finalizar Pedido" sua compra será encaminhada para nosso Whatsapp.
        </div>
      </div>
      <div class="content">
        <div id="spinner" class="spinner hidden"></div>
        <div id="lista-cervejas" class="cervejas-container"></div>

        <aside class="slide-carrinho" id="carrinhoAside">
          <div class="box">
            <div class="resumo">Resumo da compra</div>
            <div id="carrinho-itens"></div>
            <div class="info-total">
              <div>
                <span>Sub-total</span><span id="subtotal">R$ 0,00</span>
              </div>
              <div>Taxa de Entrega: <span id="frete">R$ 15,00</span></div>
            </div>
            <div class="total">
              <span>Total</span><span id="total">R$ 0,00</span>
            </div>
          </div>
          <button class="btn" id="finalizarPedido">Finalizar Pedido</button>
        </aside>
      </div>
    </main>

    <div data-site-footer></div>

    <!-- -----------------------Prompt de Finalização---------------------------------- -->
    <div id="promptCliente" class="prompt hidden">
      <div class="prompt-box">
        <h3>Finalizar Pedido</h3>
        <input
          type="text"
          id="nomeCliente"
          placeholder="Seu nome / * preenchimento obrigatório"
        />
        <input
          type="number"
          id="telefoneCliente"
          placeholder="Seu telefone / * preenchimento obrigatório"
        />
        <input
          type="text"
          id="enderecoCliente"
          placeholder="Seu endereço / * preenchimento obrigatório"
        />
        <input
          type="email"
          id="emailCliente"
          placeholder="Seu e-mail / opcional"
        />
        <div class="termos">
          <label for="termos">Declaro ter mais de 18 anos.</label
          ><input type="checkbox" id="termos" />
        </div>
        <div class="botoes">
          <button id="cancelarPrompt">Cancelar</button>
          <button id="enviarPedido">Enviar Pedido</button>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script type="module" src="js/loja.js"></script>
    <script src="js/mobile-navbar.js" defer></script>
    <script src="js/footer-component.js" defer></script>
    <script src="js/carrinho.js" defer></script>
    <script src="js/carrossel.js" defer></script>
    <script src="js/contador-carrinho.js" defer></script>
    <script src="js/popup-idade.js" defer></script>
    <script>
      window.DOGTOWN_ANALYTICS_API =
        "https://dogtown.onrender.com/api/analytics/event";
    </script>
